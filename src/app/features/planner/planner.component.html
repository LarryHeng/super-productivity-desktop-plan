<div class="planner-toolbar">
  <div class="week-month-selector">
    <button
      mat-icon-button
      type="button"
      [class.active]="!isMonthView()"
      [attr.aria-pressed]="!isMonthView()"
      [attr.aria-label]="T.F.SCHEDULE.VIEW_WEEK | translate"
      [matTooltip]="T.F.SCHEDULE.VIEW_WEEK | translate"
      (click)="selectPlannerView('week')"
    >
      <mat-icon>view_week</mat-icon>
    </button>
    <button
      mat-icon-button
      type="button"
      [class.active]="isMonthView()"
      [attr.aria-pressed]="isMonthView()"
      [attr.aria-label]="T.F.SCHEDULE.VIEW_MONTH | translate"
      [matTooltip]="T.F.SCHEDULE.VIEW_MONTH | translate"
      (click)="selectPlannerView('month')"
    >
      <mat-icon>calendar_month</mat-icon>
    </button>
  </div>

  <nav
    class="date-nav-group"
    [attr.aria-label]="
      (isMonthView() ? T.F.SCHEDULE.VIEW_MONTH : T.F.PLANNER.WEEK_NAV) | translate
    "
  >
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        (isMonthView() ? T.F.SCHEDULE.PREVIOUS_MONTH : T.F.PLANNER.PREVIOUS_WEEK)
          | translate
      "
      [matTooltip]="
        (isMonthView() ? T.F.SCHEDULE.PREVIOUS_MONTH : T.F.PLANNER.PREVIOUS_WEEK)
          | translate
      "
      (click)="goToPreviousPeriod()"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>
    @if (!isMonthView()) {
      <button
        mat-stroked-button
        type="button"
        class="return-today-btn"
        data-testid="planner-week-return-today"
        [disabled]="isCurrentPeriod()"
        [attr.aria-label]="T.F.SCHEDULE.RETURN_TO_TODAY | translate"
        [matTooltip]="T.F.SCHEDULE.RETURN_TO_TODAY | translate"
        (click)="goToToday()"
      >
        <mat-icon>today</mat-icon>
        <span class="return-today-label">{{
          T.F.SCHEDULE.RETURN_TO_TODAY | translate
        }}</span>
      </button>
    } @else {
      <button
        mat-icon-button
        type="button"
        class="today-btn"
        [disabled]="isCurrentPeriod()"
        [attr.aria-label]="T.G.TODAY_TAG_TITLE | translate"
        [matTooltip]="T.G.TODAY_TAG_TITLE | translate"
        (click)="goToToday()"
      >
        <mat-icon>wb_sunny</mat-icon>
      </button>
    }
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        (isMonthView() ? T.F.SCHEDULE.NEXT_MONTH : T.F.PLANNER.NEXT_WEEK) | translate
      "
      [matTooltip]="
        (isMonthView() ? T.F.SCHEDULE.NEXT_MONTH : T.F.PLANNER.NEXT_WEEK) | translate
      "
      (click)="goToNextPeriod()"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  </nav>

  <div class="title">{{ isMonthView() ? monthLabel() : weekLabel() }}</div>
</div>

@if (!isMonthView()) {
  <planner-calendar-nav
    [visibleDayDate]="planView.visibleDayDate()"
    [daysWithTasks]="daysWithTasks()"
    [overdueDays]="overdueDays()"
    [defaultExpanded]="!layoutService.isXs()"
    (dayTapped)="planView.scrollToDay($event)"
  />
}

@if (isMonthView()) {
  <planner-month
    [days]="monthDays()"
    [daysToShow]="monthDaysToShow()"
    [overdueDays]="overdueDays()"
    (daySelected)="onMonthDaySelected($event)"
    (todaySelected)="showCurrentMonth()"
  />
}

<planner-plan-view
  #planView
  cdkDropListGroup
  cdkScrollable
  [overdueDays]="overdueDays()"
  [hidden]="isMonthView()"
/>
