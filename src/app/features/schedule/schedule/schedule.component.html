<div class="schedule-nav-controls">
  <div class="week-month-selector">
    <button
      mat-icon-button
      class="week-month-btn"
      [class.active]="!isMonthView()"
      [attr.aria-pressed]="!isMonthView()"
      (click)="selectTimeView('week')"
      [matTooltip]="T.F.SCHEDULE.VIEW_WEEK | translate"
      [attr.aria-label]="T.F.SCHEDULE.VIEW_WEEK | translate"
    >
      <mat-icon>view_week</mat-icon>
    </button>
    <button
      mat-icon-button
      class="week-month-btn"
      [class.active]="isMonthView()"
      [attr.aria-pressed]="isMonthView()"
      (click)="selectTimeView('month')"
      [matTooltip]="T.F.SCHEDULE.VIEW_MONTH | translate"
      [attr.aria-label]="T.F.SCHEDULE.VIEW_MONTH | translate"
    >
      <mat-icon>calendar_month</mat-icon>
    </button>
  </div>

  @if (showCalFilterBtn()) {
    <button
      mat-icon-button
      [matMenuTriggerFor]="calFilterMenu"
      [matTooltip]="T.F.SCHEDULE.CALENDAR_VISIBILITY | translate"
      [attr.aria-label]="T.F.SCHEDULE.CALENDAR_VISIBILITY | translate"
    >
      <mat-icon>event_note</mat-icon>
    </button>
    <mat-menu #calFilterMenu="matMenu">
      <ng-template matMenuContent>
        <div (click)="$event.stopPropagation()">
          @for (provider of enabledCalendarProviders(); track provider.id) {
            <button
              mat-menu-item
              role="menuitemcheckbox"
              [attr.aria-checked]="!hiddenCalendarProviderIds().includes(provider.id)"
              (click)="toggleCalProvider(provider.id)"
            >
              @if (hiddenCalendarProviderIds().includes(provider.id)) {
                <mat-icon>check_box_outline_blank</mat-icon>
              } @else {
                <mat-icon>check_box</mat-icon>
              }
              @if (provider.color) {
                <span
                  class="cal-color-dot"
                  [style.background]="provider.color"
                ></span>
              }
              {{ calProviderLabel(provider) }}
            </button>
          }
        </div>
      </ng-template>
    </mat-menu>
  }

  <button
    mat-icon-button
    data-testid="schedule-block-colors"
    [matMenuTriggerFor]="blockColorMenu"
    [matTooltip]="T.F.SCHEDULE.BLOCK_COLORS | translate"
    [attr.aria-label]="T.F.SCHEDULE.BLOCK_COLORS | translate"
  >
    <mat-icon>palette</mat-icon>
  </button>
  <mat-menu #blockColorMenu="matMenu">
    <ng-template matMenuContent>
      <div
        class="block-color-menu"
        (click)="$event.stopPropagation()"
      >
        <label>
          <span>{{ T.F.SCHEDULE.PLANNED_BLOCK_COLOR | translate }}</span>
          <input
            type="color"
            data-testid="schedule-planned-block-color"
            [value]="blockColors().planned"
            (change)="updateBlockColor('planned', $event)"
          />
        </label>
        <label>
          <span>{{ T.F.SCHEDULE.ACTUAL_BLOCK_COLOR | translate }}</span>
          <input
            type="color"
            data-testid="schedule-actual-block-color"
            [value]="blockColors().actual"
            (change)="updateBlockColor('actual', $event)"
          />
        </label>
        <label>
          <span>{{ T.F.SCHEDULE.COMPLETED_PLANNED_BLOCK_COLOR | translate }}</span>
          <input
            type="color"
            data-testid="schedule-backfilled-block-color"
            [value]="blockColors().completedPlanned"
            (change)="updateBlockColor('completedPlanned', $event)"
          />
        </label>
      </div>
    </ng-template>
  </mat-menu>

  <button
    mat-icon-button
    (click)="openManualRecord()"
    [matTooltip]="T.F.SCHEDULE.MANUAL_RECORD | translate"
    [attr.aria-label]="T.F.SCHEDULE.MANUAL_RECORD | translate"
  >
    <mat-icon>history_toggle_off</mat-icon>
  </button>

  <div class="date-nav-group">
    <button
      mat-icon-button
      (click)="goToPreviousPeriod()"
      [attr.aria-label]="
        (isMonthView() ? T.F.SCHEDULE.PREVIOUS_MONTH : T.F.SCHEDULE.PREVIOUS_WEEK)
          | translate
      "
      [matTooltip]="
        (isMonthView() ? T.F.SCHEDULE.PREVIOUS_MONTH : T.F.SCHEDULE.PREVIOUS_WEEK)
          | translate
      "
    >
      <mat-icon>chevron_left</mat-icon>
    </button>

    @if (!isMonthView()) {
      <button
        mat-stroked-button
        class="return-today-btn"
        data-testid="schedule-week-return-today"
        (click)="goToToday()"
        [disabled]="isViewingToday()"
        [attr.aria-label]="T.F.SCHEDULE.RETURN_TO_TODAY | translate"
        [matTooltip]="T.F.SCHEDULE.RETURN_TO_TODAY | translate"
      >
        <mat-icon>today</mat-icon>
        <span class="return-today-label">{{
          T.F.SCHEDULE.RETURN_TO_TODAY | translate
        }}</span>
      </button>
    } @else {
      <button
        mat-icon-button
        class="today-btn"
        (click)="goToToday()"
        [disabled]="isViewingToday()"
        [attr.aria-label]="T.G.TODAY_TAG_TITLE | translate"
        [matTooltip]="T.G.TODAY_TAG_TITLE | translate"
      >
        <mat-icon>wb_sunny</mat-icon>
      </button>
    }

    <button
      mat-icon-button
      (click)="goToNextPeriod()"
      [attr.aria-label]="
        (isMonthView() ? T.F.SCHEDULE.NEXT_MONTH : T.F.SCHEDULE.NEXT_WEEK) | translate
      "
      [matTooltip]="
        (isMonthView() ? T.F.SCHEDULE.NEXT_MONTH : T.F.SCHEDULE.NEXT_WEEK) | translate
      "
    >
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <div class="title">{{ headerTitle() }}</div>
</div>

<div
  class="scroll-wrapper"
  [attr.data-horizontal-scroll]="shouldEnableHorizontalScroll() || null"
  (scroll)="onScrollWrapperScroll($event)"
>
  @if (isMonthView()) {
    <schedule-month
      [events]="monthEvents()"
      [daysToShow]="daysToShow()"
      [weeksToShow]="weeksToShow()"
      [firstDayOfWeek]="firstDayOfWeek()"
      (daySelected)="onMonthDaySelected($event)"
      (todaySelected)="goToToday()"
    ></schedule-month>
  } @else {
    <schedule-week
      [events]="events()"
      [beyondBudget]="beyondBudget()"
      [daysToShow]="daysToShow()"
      [workStartEnd]="workStartEnd() || null"
      [currentTimeRow]="currentTimeRow()"
      [todayDateStr]="_todayDateStr()"
      [isHorizontalScrollMode]="shouldEnableHorizontalScroll()"
      [isHScrolled]="isHScrolled()"
    ></schedule-week>
  }
</div>
