@if (isShowInner) {
  <task-context-menu-inner
    #taskContextMenuInner
    [isAdvancedControls]="isAdvancedControls()"
    [isTimeSpentEditHidden]="isTimeSpentEditHidden()"
    [isManualRecordAvailable]="isManualRecordAvailable()"
    [isActualRecord]="isActualRecord()"
    (manualRecord)="manualRecord.emit()"
    (adjustActualRecord)="adjustActualRecord.emit()"
    (close)="isShowInner = false"
    [task]="task()"
  ></task-context-menu-inner>
}
