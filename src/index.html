<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta

    <link

    <!-- Content-Security-Policy. See GHSA-78rv-m663-4fph.
      'unsafe-eval' and 'unsafe-inline' currently CANNOT be dropped:
        - the plugin runtime runs plugin code via `new Function`
          (src/app/plugins/plugin-runner.ts) → needs 'unsafe-eval';
        - the inline browser-compat bootstrap <script> below also uses
          `new Function` and is inline → needs both.
      The packaged app loads the renderer over file:// (electron/main-window.ts),
      where 'self' is an opaque origin, so tightening script-src to 'self' is
      unreliable. A real lockdown (dropping unsafe-inline/unsafe-eval) needs:
      a registered app:// scheme instead of file://, plugin execution moved into
      a sandboxed iframe/worker, and the inline bootstrap externalized.
      object-src 'none' is safe to set now (the app embeds no <object>/<embed>).
      @see https://content-security-policy.com/ -->
    <meta
      content="default-src * uploaded:;
          connect-src * data: blob: filesystem: uploaded:;
          frame-src * data: blob:;
          font-src * data:;
          img-src * data: blob: filesystem: file:;
          style-src * 'unsafe-inline' ;
          object-src 'none';
          script-src * 'self' 'unsafe-inline' 'unsafe-eval' blob:"
      http-equiv="Content-Security-Policy"
    />
    <base href="./" />
    <style type="text/css">
      html,
      body {
        height: 100%;
      }

      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: rgb(18, 18, 18);
        color: #fff;
      }

      .loading-full-page-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        cursor: grab;
        -webkit-app-region: drag;
      }

      .loading-full-page-wrapper:active {
        cursor: grabbing;
      }

      .app-loading {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .app-loading .logo {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
      }

      .app-loading .logo path {
        fill: #fff;
      }

      @media (prefers-color-scheme: light) {
        body {
          background: transparent;
          background-image: none;
          color: #000000;
        }

        .app-loading .logo path {
          fill: #000;
        }
      }

      .app-loading .spinner {
        position: relative;
        margin: 100px auto;
        width: 120px;
        height: 120px;
      }

      .app-loading .spinner-pulse {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 140px;
        height: 140px;
        margin: -70px 0 0 -70px;
        border-radius: 50%;
        background-color: #6495ed;
        opacity: 0;
        animation: sp-pulse 2s ease-in-out infinite;
      }

      .productivity-tip {
        text-align: center;
        position: absolute;
        left: 50%;
        bottom: 70%;
        width: 400px;
        max-width: 80vw;
        transform: translate(-50%);
        padding-bottom: 10px;
      }

      .app-loading .productivity-tip h2#heading {
        font:
          500 20px/32px 'Open Sans',
          'Helvetica Neue',
          sans-serif;
        margin: 0 0 8px !important;
        color: inherit;
      }

      .app-loading .productivity-tip p {
        font:
          400 14px/20px 'Open Sans',
          'Helvetica Neue',
          sans-serif;
        margin: 0 0 8px !important;
      }

      @keyframes sp-pulse {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
        50% {
          opacity: 0.15;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body class="mat-typography">
    <app-root>
      <div class="loading-full-page-wrapper">
        <div class="app-loading">
          <div class="productivity-tip">
            <h2 id="heading">Heading</h2>
            <p id="text">Text</p>
          </div>

          <div class="spinner">
            <div class="spinner-pulse"></div>
          </div>

          <svg
            class="logo"
            viewBox="0 0 64 64"
          >
            <path
              d="M 0.65537046,34.582787 32.452267,63.855301 63.791548,0.94356422 30.222644,47.722023 Z"
              id="path3395"
              style="
                fill-opacity: 1;
                fill-rule: evenodd;
                stroke: none;
                stroke-width: 1.46761858;
                stroke-linecap: butt;
                stroke-linejoin: bevel;
                stroke-miterlimit: 13.80000019;
                stroke-dasharray: none;
                stroke-opacity: 1;
              "
            />
          </svg>
        </div>
      </div>
    </app-root>
    <noscript>Please enable JavaScript to use this application.</noscript>
    <script>
      // Browser compatibility check — must use ES5 syntax only.
      // The app targets ES2022+ (Safari 18+, Chrome 107+). On older browsers the
      // compiled JS will fail to parse, leaving the user stuck on the splash screen.
      // This detects unsupported browsers early and shows a helpful message.
      (function () {
        var unsupported = false;
        if (typeof structuredClone !== 'function') {
          unsupported = true;
        }
        if (!unsupported) {
          try {
            new Function('class C { static {} }')();
          } catch (e) {
            unsupported = true;
          }
        }
        if (unsupported) {
          var el = document.querySelector('.app-loading');
          if (el) {
            el.innerHTML =
              '<div style="text-align:center;padding:32px 24px;max-width:400px">' +
              '<h2 style="font:500 20px/28px sans-serif;margin:0 0 16px">Browser Update Required</h2>' +
              '<p style="font:400 14px/22px sans-serif;margin:0 0 12px">' +
              'Super Productivity requires a newer browser version to run.' +
              '</p>' +
              '<p style="font:400 14px/22px sans-serif;margin:0">' +
              'Please update your operating system or browser and try again.' +
              '</p>' +
              '</div>';
          }
        }
      })();

      var productivityTips = [
        [
          '你背不下来的书，总有人能背下来',
          '你做不出来的题，总有人能做出来。你愿意拖到明天的事，总有人今天就能做完。',
        ],
        [
          '考研不是因为有希望才坚持',
          '而是因为坚持了才有希望。每一个早起背单词的清晨，都是你在为自己铺路。',
        ],
        ['最慢的步伐不是跬步，而是徘徊', '最快的脚步不是冲刺，而是坚持。 ― 《人民日报》'],
        [
          '你觉得这条路很难走的时候',
          '一定是上坡路。那些你独自努力的时光，终会让你变成那个发光的人。',
        ],
        ['今天翻的是书，明天数的是钱', '没有人能让你输，除非你不想赢。'],
        [
          '你现在偷的每一个懒',
          '都是给未来挖的坑。你现在熬的每一个夜，都是给未来铺的路。',
        ],
        ['最痛苦的不是失败', '而是"我本可以"。不要让这句话成为你明年的遗憾。'],
        ['别让未来的你', '讨厌现在不努力的自己。'],
        ['你只管努力，剩下的交给时间', '生活不会亏待每一个拼命努力的人。'],
        ['哪有什么一战成名', '不过是百炼成钢。哪有什么常胜将军，不过是越挫越勇。'],
        ['考研是一场孤独的旅行', '但也是一次自我的修行。一个人，一支笔，一个奇迹。'],
        [
          '不要假装努力，结果不会陪你演戏',
          '真正的努力不需要表演，它只会在成绩单上说话。',
        ],
        ['乾坤未定，你我皆是黑马', '乾坤已定，那就扭转乾坤。'],
        [
          '你的对手在翻书',
          '你的仇人在磨刀，你的闺蜜在减肥，隔壁老王在练腰——你有什么资格不努力？',
        ],
        ['宁可现在累一阵子', '不要以后苦一辈子。吃不了学习的苦，就要吃生活的苦。'],
        [
          '当你快坚持不住的时候',
          '想想父母期待的目光，想想你为之放弃的一切，想想你梦想中录取通知书的样子。',
        ],
        ['既然选择了远方', '便只顾风雨兼程。 ― 汪国真'],
        ['谁终将声震人间', '必长久深自缄默。谁终将点燃闪电，必长久如云漂泊。 ― 尼采'],
        ['每一个不曾起舞的日子', '都是对生命的辜负。 ― 尼采'],
        [
          '天将降大任于是人也',
          '必先苦其心志，劳其筋骨，饿其体肤，空乏其身，行拂乱其所为。 ― 《孟子》',
        ],
        ['路漫漫其修远兮', '吾将上下而求索。 ― 屈原'],
        ['长风破浪会有时', '直挂云帆济沧海。 ― 李白'],
        ['宝剑锋从磨砺出', '梅花香自苦寒来。'],
        ['不积跬步，无以至千里', '不积小流，无以成江海。 ― 《荀子》'],
        ['今天你做别人不愿做的事', '明天你就能做别人做不到的事。'],
        ['努力到无能为力', '拼搏到感动自己。'],
        [
          '当你觉得晚了的时候',
          '恰恰是最早的时候。种一棵树最好的时间是十年前，其次是现在。',
        ],
        ['你要悄悄努力', '然后惊艳所有人。'],
        ['自律的前期是兴奋', '中期是痛苦，后期是享受。熬过中期，你就赢了。'],
        ['考研比的不是谁聪明', '而是谁更能坚持。坚持到最后的人，就已经赢了大多数人。'],
        [
          '人生没有白走的路',
          '每一步都算数。你背过的每一个单词，做过的每一道题，都不会辜负你。',
        ],
        ['成功就是1%的天赋', '加上99%的汗水。 ― 爱迪生'],
        ['不是看到希望才去努力', '而是努力了才能看到希望。'],
        ['明天的你', '一定会感谢今天拼命的自己。'],
        ['你的日积月累', '早晚会成为别人的望尘莫及。'],
      ];

      function showTip(tips) {
        var randomIndex = Math.floor(Math.random() * tips.length);
        var headingEl = document.getElementById('heading');
        var textEl = document.getElementById('text');
        if (headingEl && textEl) {
          headingEl.innerText = tips[randomIndex][0];
          textEl.innerText = tips[randomIndex][1];
        }
      }

      // Try to load custom quotes from %APPDATA%/superProductivity/productivity-quotes.json
      if (window.ea && window.ea.loadProductivityQuotes) {
        window.ea
          .loadProductivityQuotes()
          .then(function (raw) {
            if (raw) {
              try {
                var custom = JSON.parse(raw);
                if (Array.isArray(custom) && custom.length > 0) {
                  showTip(custom);
                  return;
                }
              } catch (e) {
                /* ignore */
              }
            }
            showTip(productivityTips);
          })
          .catch(function () {
            showTip(productivityTips);
          });
      } else {
        showTip(productivityTips);
      }
    </script>
  </body>
</html>
