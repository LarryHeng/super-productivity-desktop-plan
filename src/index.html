    <!-- Content-Security-Policy. See GHSA-78rv-m663-4fph.
      'unsafe-eval' and 'unsafe-inline' currently CANNOT be dropped:
        - the plugin runtime runs plugin code via `new Function`
          (src/app/plugins/plugin-runner.ts) → needs 'unsafe-eval';
        - the inline browser-compat bootstrap <script> below also uses
          `new Function` and is inline → needs both.
      The packaged app loads the renderer over file:// (electron/main-window.ts),
      where 'self' is an opaque origin, so tightening script-src to 'self' is
      unreliable. A real lockdown (dropping unsafe-inline/unsafe-eval) needs:
      a registered app:// scheme instead of file://, plugin execution moved into
      a sandboxed iframe/worker, and the inline bootstrap externalized.
      object-src 'none' is safe to set now (the app embeds no <object>/<embed>).
      @see https://content-security-policy.com/ -->
    <meta
      content="default-src * uploaded:;
          connect-src * data: blob: filesystem: uploaded:;
          frame-src * data: blob:;
          font-src * data:;
          img-src * data: blob: filesystem: file:;
          style-src * 'unsafe-inline' ;
          object-src 'none';
          script-src * 'self' 'unsafe-inline' 'unsafe-eval' blob:"
      http-equiv="Content-Security-Policy"
    />
    <base href="./" />
    <style type="text/css">
      html,
      body {
        height: 100%;
      }

      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: rgb(18, 18, 18);
        color: #fff;
      }

      .loading-full-page-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        cursor: grab;
        -webkit-app-region: drag;
      }

      .loading-full-page-wrapper:active {
        cursor: grabbing;
      }

      .app-loading {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      .app-loading .logo {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
      }

      .app-loading .logo path {
        fill: #fff;
      }

      @media (prefers-color-scheme: light) {
        body {
          background: transparent;
          background-image: none;
          color: #000000;
        }

        .app-loading .logo path {
          fill: #000;
        }
      }

      .app-loading .spinner {
        position: relative;
        margin: 100px auto;
        width: 120px;
        height: 120px;
      }

      .app-loading .spinner-pulse {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 140px;
        height: 140px;
        margin: -70px 0 0 -70px;
        border-radius: 50%;
        background-color: #6495ed;
        opacity: 0;
        animation: sp-pulse 2s ease-in-out infinite;
      }

      .productivity-tip {
        text-align: center;
        position: absolute;
        left: 50%;
        bottom: 70%;
        width: 400px;
        max-width: 80vw;
        transform: translate(-50%);
        padding-bottom: 10px;
      }

      .app-loading .productivity-tip h2#heading {
        font:
          500 20px/32px 'Open Sans',
          'Helvetica Neue',
          sans-serif;
        margin: 0 0 8px !important;
        color: inherit;
      }

      .app-loading .productivity-tip p {
        font:
          400 14px/20px 'Open Sans',
          'Helvetica Neue',
          sans-serif;
        margin: 0 0 8px !important;
      }

      @keyframes sp-pulse {
        0%,
        100% {
          opacity: 0;
          transform: scale(0.8);
        }
        50% {
          opacity: 0.15;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body class="mat-typography">
    <app-root>
      <div class="loading-full-page-wrapper">
        <div class="app-loading">
          <div class="productivity-tip">
            <h2 id="heading">Heading</h2>
            <p id="text">Text</p>
          </div>

          <div class="spinner">
            <div class="spinner-pulse"></div>
          </div>

          <svg
            class="logo"
            viewBox="0 0 64 64"
          >
            <path
              d="M 0.65537046,34.582787 32.452267,63.855301 63.791548,0.94356422 30.222644,47.722023 Z"
              id="path3395"
              style="
                fill-opacity: 1;
                fill-rule: evenodd;
                stroke: none;
                stroke-width: 1.46761858;
                stroke-linecap: butt;
                stroke-linejoin: bevel;
                stroke-miterlimit: 13.80000019;
                stroke-dasharray: none;
                stroke-opacity: 1;
              "
            />
          </svg>
        </div>
      </div>
    </app-root>
    <noscript>Please enable JavaScript to use this application.</noscript>
    <script>
      // Browser compatibility check — must use ES5 syntax only.
      // The app targets ES2022+ (Safari 18+, Chrome 107+). On older browsers the
      // compiled JS will fail to parse, leaving the user stuck on the splash screen.
      // This detects unsupported browsers early and shows a helpful message.
      (function () {
        var unsupported = false;
        if (typeof structuredClone !== 'function') {
          unsupported = true;
        }
        if (!unsupported) {
          try {
            new Function('class C { static {} }')();
          } catch (e) {
            unsupported = true;
          }
        }
        if (unsupported) {
          var el = document.querySelector('.app-loading');
          if (el) {
            el.innerHTML =
              '<div style="text-align:center;padding:32px 24px;max-width:400px">' +
              '<h2 style="font:500 20px/28px sans-serif;margin:0 0 16px">Browser Update Required</h2>' +
              '<p style="font:400 14px/22px sans-serif;margin:0 0 12px">' +
              'Super Productivity requires a newer browser version to run.' +
              '</p>' +
              '<p style="font:400 14px/22px sans-serif;margin:0">' +
              'Please update your operating system or browser and try again.' +
              '</p>' +
              '</div>';
          }
        }
      })();

      var productivityTips = [
        ['善待他人', '对他人给予积极关注这一简单行为，与生产力有很大关系。 ― Tom Peters'],
        ['成就新事物', '生产力就是能够做到你以前做不到的事情。 ― Franz Kafka'],
        [

          '强调产出是提高生产力的关键，而试图增加活动量可能适得其反。 ― Paul Gauguin',
        ],
        [
          '解决复杂问题只有一个办法',
          '尝试并修正，尝试并修正，尝试并修正，尝试并修正，尝试并修正……',
        ],
        ['两步高效法', '1. 坐到工作位置上。2. 做一件小事。'],
        ['分清优先级', '先做最重要的事。'],
        ['拖延症', '拖延是情绪调节问题，而非时间管理问题。'],
        ['不确定时，使用程序员估算魔法因子', '程序员估算任务时长为原定时间的 π 倍。'],
        ['现实一点', '几乎每件事都会比你预期的时间更长。'],
        ['足够好就够了', '不要追求完美。专注在重要的事情上。'],
        [
          '分心事物',
          '如果有东西让你分心，处理掉它。如果它萦绕在你脑海里挥之不去，先写下来稍后处理。',
        ],
        ['有趣的事情优先做', '多巴胺能帮你完成剩下的任务！'],
        [
          '庆祝',
          '完成一个任务后，不要急着冲向下一项。给自己一些时间为自己的成就感到高兴！',
        ],
        ['建立日常惯例', '做决定需要时间。所以建立日常惯例可以非常有帮助。'],
        ['适时休息', '休息有助于清空思绪，从长远看让你更有生产力。去吧！出去走走！'],
        ['杂乱制造压力', '清理工作区域的杂物！'],
        ['专注单一任务', '多任务并行是最糟糕的做法。'],
        [

          '有目标（或几个小目标）能增加动力和专注度。提醒自己为什么要做这件事！',
        ],
        ['尽量一次做对', '这可以帮助你避免任务无限拖延。'],
        [
          '我们重复做什么，就会成为什么样的人',
          '卓越，不是什么行为，而是一种习惯。 ― Aristotle',
        ],
        ['学习走路靠的不是规则', '你靠的是去做，以及跌倒。 ― Richard Branson'],
        ['定义好每一个任务', '问题表述清楚，就已经解决了一半。 ― John Dewey'],
        [
          '要么喜欢你所做的事，要么知道你为什么做',
          '如果不喜欢也不知道为什么，考虑做点别的。',
        ],
        ['专注在重要的事情上', '智慧就是学会忽略什么。 ― William James'],
        ['行动战胜恐惧', '与其活在恐惧中，不如去完成它。 ― Logen Ninefingers'],
        ['并不是我有多聪明', '而是我和问题待在一起的时间更长。 ― Albert Einstein'],
        ['你可以做到', '持续思考的力量足以攻克任何难题。 ― Voltaire'],
        ['我没有失败', '我只是找到了一万种行不通的办法。 ― Thomas A. Edison'],
        [
          '回顾与反思',
          '每天或每周结束时，回顾你的进展，反思哪些有效哪些无效。据此调整你的策略。',
        ],
        [
          '设定合理的期望',
          '不要给自己安排不切实际的工作量。诚实地评估你在给定时间内能完成什么。',
        ],
        [
          '任务的优先级',
          '使用艾森豪威尔矩阵（紧急 vs. 重要）等技巧来排定任务优先级。专注在最重要和最紧迫的事上。',
        ],
        ['永远善待自己', '没有良好的自我关怀，生产力是不可能持续的（至少从长远来看）。'],
        ['进步之路在于自我评估', '时常反思你的目标和方法是否对你有益。'],
        [
          '拥抱进步而非成就',
          '重要的不是每天取得巨大飞跃，而是日积月累的微小进步最终带来显著成就。',
        ],
        ['做决定', '你缺的不是更多时间，你需要做决定。 ― Seth Godin'],
        ['决定什么不做', '你的一天（乃至一生）只有那么多时间。决定你真正想做什么。'],
      ];
      var randomIndex = Math.floor(Math.random() * productivityTips.length);
      var headingEl = document.getElementById('heading');
      var textEl = document.getElementById('text');
      if (headingEl && textEl) {
        headingEl.innerText = productivityTips[randomIndex][0];
        textEl.innerText = productivityTips[randomIndex][1];
      }

      (function () {})();
    </script>
